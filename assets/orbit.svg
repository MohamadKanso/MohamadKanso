<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 900 280" width="900" height="280">
  <defs>

    <!-- Space background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#04060f"/>
      <stop offset="40%"  stop-color="#0b0e28"/>
      <stop offset="70%"  stop-color="#120a2e"/>
      <stop offset="100%" stop-color="#04060f"/>
    </linearGradient>

    <!-- Planet gradient: purple-violet sphere -->
    <radialGradient id="planet" cx="36%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#c8a8f0"/>
      <stop offset="25%"  stop-color="#8c52cc"/>
      <stop offset="60%"  stop-color="#4a1e8a"/>
      <stop offset="100%" stop-color="#130530"/>
    </radialGradient>

    <!-- Ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#9b72cf" stop-opacity="0.6"/>
      <stop offset="50%"  stop-color="#c8a8f0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#9b72cf" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Nebula pink -->
    <radialGradient id="neb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ff6b9d" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#ff6b9d" stop-opacity="0"/>
    </radialGradient>

    <!-- Nebula cyan -->
    <radialGradient id="neb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00d4ff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Nebula purple -->
    <radialGradient id="neb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7b5ea7" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7b5ea7" stop-opacity="0"/>
    </radialGradient>

    <!-- Planet atmospheric glow -->
    <filter id="planetGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for spacecraft -->
    <filter id="craftGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Orbit ellipse path: center (375,140), rx=215, ry=62 -->
    <!-- Leftmost: (160,140)  Rightmost: (590,140) -->
    <path id="orbitPath"
          d="M 590,140
             A 215,62 0 1,0 160,140
             A 215,62 0 1,0 590,140"/>

  </defs>

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="900" height="280" fill="url(#bg)"/>

  <!-- ═══ NEBULAE ═══ -->
  <ellipse cx="140" cy="90"  rx="185" ry="100" fill="url(#neb1)"/>
  <ellipse cx="730" cy="195" rx="165" ry="90"  fill="url(#neb2)"/>
  <ellipse cx="510" cy="45"  rx="130" ry="65"  fill="url(#neb3)"/>
  <ellipse cx="820" cy="80"  rx="100" ry="55"  fill="url(#neb1)" opacity="0.6"/>

  <!-- ═══ STARS ═══ (twinkling via SMIL animate) -->
  <!-- Top-left quadrant -->
  <circle cx="22"  cy="18"  r="1.1" fill="white">   <animate attributeName="opacity" values="1;0.2;1"   dur="3.1s" begin="0s"    repeatCount="indefinite"/></circle>
  <circle cx="58"  cy="42"  r="0.7" fill="#8be9fd"> <animate attributeName="opacity" values="0.8;0.1;0.8" dur="2.4s" begin="0.6s"  repeatCount="indefinite"/></circle>
  <circle cx="105" cy="22"  r="1.0" fill="white">   <animate attributeName="opacity" values="0.9;0.3;0.9" dur="4.2s" begin="1.3s"  repeatCount="indefinite"/></circle>
  <circle cx="148" cy="58"  r="0.6" fill="#ffd700"> <animate attributeName="opacity" values="1;0.4;1"    dur="2.8s" begin="0.9s"  repeatCount="indefinite"/></circle>
  <circle cx="78"  cy="86"  r="0.9" fill="white">   <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.7s" begin="2.1s"  repeatCount="indefinite"/></circle>
  <circle cx="32"  cy="120" r="0.7" fill="#8be9fd"> <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.6s" begin="1.0s"  repeatCount="indefinite"/></circle>
  <circle cx="118" cy="140" r="0.6" fill="white">   <animate attributeName="opacity" values="0.6;0.1;0.6" dur="5.0s" begin="3.2s"  repeatCount="indefinite"/></circle>
  <circle cx="55"  cy="175" r="1.0" fill="#ffd700"> <animate attributeName="opacity" values="1;0.4;1"    dur="2.7s" begin="0.5s"  repeatCount="indefinite"/></circle>
  <circle cx="92"  cy="205" r="0.8" fill="white">   <animate attributeName="opacity" values="0.7;0.2;0.7" dur="4.0s" begin="1.8s"  repeatCount="indefinite"/></circle>
  <circle cx="28"  cy="248" r="1.1" fill="#8be9fd"> <animate attributeName="opacity" values="0.9;0.3;0.9" dur="3.0s" begin="0.7s"  repeatCount="indefinite"/></circle>
  <circle cx="130" cy="258" r="0.7" fill="white">   <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.5s" begin="2.4s"  repeatCount="indefinite"/></circle>

  <!-- Top-center (avoiding planet zone: ~305-445, 78-202) -->
  <circle cx="242" cy="16"  r="0.9" fill="white">   <animate attributeName="opacity" values="0.9;0.2;0.9" dur="3.5s" begin="0.4s"  repeatCount="indefinite"/></circle>
  <circle cx="298" cy="38"  r="0.7" fill="#8be9fd"> <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.3s" begin="1.6s"  repeatCount="indefinite"/></circle>
  <circle cx="460" cy="20"  r="1.0" fill="white">   <animate attributeName="opacity" values="1;0.3;1"    dur="4.3s" begin="0.8s"  repeatCount="indefinite"/></circle>
  <circle cx="520" cy="12"  r="0.7" fill="#ff6b9d"> <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3.2s" begin="2.2s"  repeatCount="indefinite"/></circle>
  <circle cx="268" cy="72"  r="0.6" fill="#ffd700"> <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2.9s" begin="1.1s"  repeatCount="indefinite"/></circle>
  <circle cx="488" cy="68"  r="0.8" fill="white">   <animate attributeName="opacity" values="0.9;0.2;0.9" dur="3.8s" begin="0.3s"  repeatCount="indefinite"/></circle>
  <circle cx="248" cy="205" r="0.7" fill="#8be9fd"> <animate attributeName="opacity" values="0.7;0.2;0.7" dur="4.1s" begin="2.7s"  repeatCount="indefinite"/></circle>
  <circle cx="488" cy="215" r="0.9" fill="white">   <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3.3s" begin="1.4s"  repeatCount="indefinite"/></circle>
  <circle cx="360" cy="262" r="1.0" fill="#ffd700"> <animate attributeName="opacity" values="1;0.4;1"    dur="2.6s" begin="0.9s"  repeatCount="indefinite"/></circle>
  <circle cx="418" cy="256" r="0.7" fill="white">   <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.9s" begin="3.1s"  repeatCount="indefinite"/></circle>

  <!-- Top-right quadrant -->
  <circle cx="615" cy="24"  r="1.2" fill="white">   <animate attributeName="opacity" values="1;0.3;1"    dur="3.6s" begin="0.6s"  repeatCount="indefinite"/></circle>
  <circle cx="665" cy="48"  r="0.8" fill="#8be9fd"> <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.7s" begin="1.4s"  repeatCount="indefinite"/></circle>
  <circle cx="745" cy="28"  r="1.0" fill="white">   <animate attributeName="opacity" values="0.9;0.4;0.9" dur="4.4s" begin="0.9s"  repeatCount="indefinite"/></circle>
  <circle cx="802" cy="16"  r="0.7" fill="#ffd700"> <animate attributeName="opacity" values="1;0.3;1"    dur="2.9s" begin="1.8s"  repeatCount="indefinite"/></circle>
  <circle cx="852" cy="50"  r="1.1" fill="white">   <animate attributeName="opacity" values="0.9;0.2;0.9" dur="3.4s" begin="0.2s"  repeatCount="indefinite"/></circle>
  <circle cx="880" cy="25"  r="0.6" fill="#8be9fd"> <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2.2s" begin="2.6s"  repeatCount="indefinite"/></circle>
  <circle cx="825" cy="105" r="1.0" fill="white">   <animate attributeName="opacity" values="1;0.3;1"    dur="3.7s" begin="0.8s"  repeatCount="indefinite"/></circle>
  <circle cx="875" cy="145" r="0.8" fill="#ff6b9d"> <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.8s" begin="1.5s"  repeatCount="indefinite"/></circle>
  <circle cx="848" cy="188" r="1.2" fill="white">   <animate attributeName="opacity" values="0.9;0.4;0.9" dur="4.2s" begin="0.4s"  repeatCount="indefinite"/></circle>
  <circle cx="892" cy="222" r="0.7" fill="#8be9fd"> <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.3s" begin="2.1s"  repeatCount="indefinite"/></circle>
  <circle cx="822" cy="258" r="1.0" fill="white">   <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.6s" begin="1.7s"  repeatCount="indefinite"/></circle>
  <circle cx="656" cy="265" r="0.8" fill="#ffd700"> <animate attributeName="opacity" values="1;0.4;1"    dur="3.0s" begin="0.5s"  repeatCount="indefinite"/></circle>
  <circle cx="730" cy="245" r="0.6" fill="#ff6b9d"> <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3.5s" begin="2.3s"  repeatCount="indefinite"/></circle>
  <circle cx="580" cy="252" r="1.0" fill="white">   <animate attributeName="opacity" values="0.7;0.3;0.7" dur="4.0s" begin="1.0s"  repeatCount="indefinite"/></circle>

  <!-- ═══ SPARKLE STARS (4-pointed) ═══ -->
  <g transform="translate(50,88)">
    <line x1="-5" y1="0" x2="5" y2="0" stroke="white" stroke-width="0.9"/>
    <line x1="0" y1="-5" x2="0" y2="5" stroke="white" stroke-width="0.9"/>
    <animate attributeName="opacity" values="0;1;0.5;1;0" dur="3.5s" begin="1.0s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(785,168)">
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#ffd700" stroke-width="1.1"/>
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#ffd700" stroke-width="1.1"/>
    <line x1="-4" y1="-4" x2="4" y2="4" stroke="#ffd700" stroke-width="0.5" opacity="0.6"/>
    <line x1="4" y1="-4" x2="-4" y2="4" stroke="#ffd700" stroke-width="0.5" opacity="0.6"/>
    <animate attributeName="opacity" values="0;0.9;0" dur="4.2s" begin="2.8s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(615,212)">
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#8be9fd" stroke-width="0.9"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#8be9fd" stroke-width="0.9"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="2.9s" begin="0.5s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(260,240)">
    <line x1="-3" y1="0" x2="3" y2="0" stroke="white" stroke-width="0.8"/>
    <line x1="0" y1="-3" x2="0" y2="3" stroke="white" stroke-width="0.8"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="3.8s" begin="1.6s" repeatCount="indefinite"/>
  </g>

  <!-- ═══ SHOOTING STAR ═══ -->
  <g>
    <line x1="0" y1="0" x2="-80" y2="28" stroke="white" stroke-width="1.2"
          stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0;0;0;0;0;1;0.8;0;0;0" dur="9s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate"
                        values="820,35; 820,35; 820,35; 820,35; 820,35; 820,35; 900,70; 900,70; 900,70; 900,70"
                        dur="9s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- ═══ ORBIT TRACK ═══ -->
  <!-- Outer faint orbit indicator -->
  <ellipse cx="375" cy="140" rx="215" ry="62"
           fill="none" stroke="white" stroke-width="0.6"
           stroke-dasharray="5,12" opacity="0.18"/>

  <!-- ═══ PLANET RING – BACK HALF (upper arc, drawn before planet) ═══ -->
  <!-- Upper semicircle: from (160,140) counterclockwise to (590,140) → passes through (375,78) -->
  <path d="M 160,140 A 215,26 0 0,1 590,140"
        fill="none" stroke="url(#ringGrad)" stroke-width="13" opacity="0.30"/>
  <!-- Second narrower ring -->
  <path d="M 175,140 A 200,20 0 0,1 575,140"
        fill="none" stroke="#a78bca" stroke-width="6" opacity="0.18"/>

  <!-- ═══ PLANET BODY ═══ -->
  <!-- Outer atmosphere -->
  <circle cx="375" cy="140" r="74" fill="none" stroke="#8855cc" stroke-width="8" opacity="0.12"/>
  <circle cx="375" cy="140" r="70" fill="none" stroke="#9966dd" stroke-width="5" opacity="0.10"/>
  <!-- Main planet with glow -->
  <circle cx="375" cy="140" r="64" fill="url(#planet)" filter="url(#planetGlow)"/>
  <!-- Surface cloud bands -->
  <ellipse cx="358" cy="124" rx="34" ry="11" fill="#ffffff09" transform="rotate(-22,358,124)"/>
  <ellipse cx="392" cy="148" rx="22" ry="7"  fill="#ffffff07" transform="rotate(14,392,148)"/>
  <ellipse cx="375" cy="163" rx="28" ry="8"  fill="#ffffff05" transform="rotate(-10,375,163)"/>
  <!-- Highlight -->
  <ellipse cx="352" cy="118" rx="20" ry="9"  fill="#ffffff12" transform="rotate(-30,352,118)"/>

  <!-- ═══ PLANET RING – FRONT HALF (lower arc, drawn after planet) ═══ -->
  <path d="M 160,140 A 215,26 0 0,0 590,140"
        fill="none" stroke="url(#ringGrad)" stroke-width="13" opacity="0.55"/>
  <path d="M 175,140 A 200,20 0 0,0 575,140"
        fill="none" stroke="#c4a0e8" stroke-width="6" opacity="0.30"/>

  <!-- ═══ ORBITING SPACECRAFT ═══ -->
  <g filter="url(#craftGlow)">
    <animateMotion dur="11s" repeatCount="indefinite" rotate="auto">
      <mpath xlink:href="#orbitPath"/>
    </animateMotion>
    <!-- Spacecraft: arrow/diamond pointing forward -->
    <polygon points="0,-11  5,7  0,3  -5,7" fill="#00d4ff" opacity="0.95"/>
    <!-- Engine exhaust glow -->
    <ellipse cx="0" cy="9" rx="3.5" ry="2.5" fill="#ff6b9d" opacity="0.80">
      <animate attributeName="opacity" values="0.8;0.3;0.9;0.2;0.8" dur="0.4s" repeatCount="indefinite"/>
      <animate attributeName="rx"      values="3.5;2;4;1.5;3.5"     dur="0.4s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Craft windows -->
    <circle cx="0" cy="-4" r="1.5" fill="#e0f0ff" opacity="0.9"/>
  </g>

  <!-- ═══ TEXT LABEL (right panel) ═══ -->
  <!-- Vertical accent bar -->
  <line x1="648" y1="100" x2="648" y2="175"
        stroke="#00d4ff" stroke-width="1.0" opacity="0.45"/>
  <circle cx="648" cy="100" r="2.5" fill="#00d4ff" opacity="0.7"/>
  <circle cx="648" cy="175" r="2.5" fill="#7b5ea7" opacity="0.7"/>

  <text x="658" y="110" font-family="'Courier New',Courier,monospace"
        font-size="13" font-weight="bold" fill="#00d4ff" opacity="0.95">MOHAMAD KANSO</text>
  <text x="658" y="128" font-family="'Courier New',Courier,monospace"
        font-size="9.5" fill="#8be9fd" opacity="0.85">Python · GenAI · LLM Systems</text>
  <text x="658" y="144" font-family="'Courier New',Courier,monospace"
        font-size="9"   fill="#c9b8e8" opacity="0.75">AI Automation · RAG Pipelines</text>
  <text x="658" y="160" font-family="'Courier New',Courier,monospace"
        font-size="9"   fill="#9b72cf" opacity="0.80">▸ Cognizant · London, UK</text>
  <!-- Blinking cursor -->
  <rect x="658" y="168" width="7" height="1.5" fill="#00d4ff" opacity="0.0">
    <animate attributeName="opacity" values="0;1;1;0;0" dur="1.2s" repeatCount="indefinite"/>
  </rect>

</svg>
